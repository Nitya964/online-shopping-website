{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>
  <link rel="stylesheet" href="{% static 'css/admin.css' %}">
</head>

<body>

  <div class="admin-container">

    <aside class="sidebar">
      <h2 class="logo">Admin</h2>

      <ul>
        <li><a href="{% url 'new_app:admin_dashboard' %}">Dashboard</a></li>
        <li><a href="{% url 'new_app:admin_product' %}">Products</a></li>
        <li><a href="{% url 'new_app:logout' %}">Logout</a></li>
      </ul>

    </aside>

    <main class="main-content">

      <header class="topbar">
        <h1>Admin Dashboard</h1>
      </header>

      <section class="content">
        {% block content %}
        {% endblock %}
      </section>

    </main>

  </div>

  <script src="{% static 'js/script.js' %}"></script>

</body>

</html>
