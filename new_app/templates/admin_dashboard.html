{% extends 'admin_base.html' %}
{% block content %}
<div class="container">
  <!-- Header -->
  <div class="admin-header">
    <p>Welcome back, {{ user.username }} 👋</p>
  </div>
  <!-- Stats Cards -->
  <div class="dashboard-cards">
    <div class="card">
      <h3>Total Products</h3>
      <p>{{ products_count }}</p>
    </div>
    <div class="card">
      <h3>Total Users</h3>
      <p>{{ users_count }}</p>
    </div>
  </div>
</div>
{% endblock %}
